spring.application.name=car-rental

spring.datasource.url=${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

application.mail.from=${MAIL_FROM:navamsharma142@gmail.com}
application.mail.verification-url=${FRONTEND_URL}/verify-email
application.mail.verification-token-expiration-minutes=${VERIFICATION_TOKEN_EXP_MINUTES:30}


logging.level.org.springframework.web=DEBUG

cloudinary.cloud-name=${CLOUDINARY_USERNAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# hikari configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000

spring.datasource.hikari.connection-timeout=30000
spring.mvc.dispatch-options-request=true

frontend.url=${FRONTEND_URL}