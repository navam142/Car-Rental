name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (defaults to latest)'
        required: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ${{ github.event.inputs.tag || 'latest' }}
      # expose Docker Hub secrets as env so we can reference them in `if` expressions
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

      - name: Create docker-compose override on server (use registry images)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_SSH_USER }}@${{ secrets.SERVER_HOST }} \
            "printf 'services:\n  backend:\n    image: navamsharma142/car-rental-backend:${IMAGE_TAG}\n  frontend:\n    image: navamsharma142/car-rental-frontend:${IMAGE_TAG}\n' > /home/ubuntu/app/docker-compose.override.yml"

      - name: (Optional) Docker Hub login on server
        # `secrets` cannot be referenced directly inside some `if` expressions during workflow parsing
        # map the secret to `env` above and use `env` here instead.
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_SSH_USER }}@${{ secrets.SERVER_HOST }} "docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' -p '${{ secrets.DOCKERHUB_TOKEN }}' || true"

      - name: Pull images and restart stack
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_SSH_USER }}@${{ secrets.SERVER_HOST }} "docker-compose -f /home/ubuntu/app/docker-compose.yml -f /home/ubuntu/app/docker-compose.override.yml pull && docker-compose -f /home/ubuntu/app/docker-compose.yml -f /home/ubuntu/app/docker-compose.override.yml up -d --remove-orphans && docker system prune -f"

      - name: Wait for backend to become healthy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_SSH_USER }}@${{ secrets.SERVER_HOST }} "for i in \
            1 2 3 4 5; do \
              sleep 5; \
              curl -sSf http://localhost:8080/actuator/health && exit 0 || echo 'waiting...'; \
            done; \
            echo 'Health check failed' && docker-compose -f /home/ubuntu/app/docker-compose.yml -f /home/ubuntu/app/docker-compose.override.yml logs backend --tail=200 && exit 1"

      - name: Deployment complete
        run: echo "Deployed navamsharma142 images with tag ${IMAGE_TAG} to ${{ secrets.SERVER_HOST }}"

