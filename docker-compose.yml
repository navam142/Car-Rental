services:
  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-rental-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET}
      
      # Mail Configuration
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-noreply@carrental.com}
      
      # Application URLs
      APP_VERIFICATION_URL: ${APP_VERIFICATION_URL}
      VERIFICATION_TOKEN_EXP_MINUTES: ${VERIFICATION_TOKEN_EXP_MINUTES:-30}
      
      # Cloudinary Configuration
      CLOUDINARY_USERNAME: ${CLOUDINARY_USERNAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      
      # Neon DB Password (application will use URL from application.properties)
      NEONDB_PASSWORD: ${NEONDB_PASSWORD}

    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - car-rental-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL}"
    container_name: car-rental-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - car-rental-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3


networks:
  car-rental-network:
    driver: bridge
